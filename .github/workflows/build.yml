name: Build Multi-Platform Executables

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: DocumentReplacer_Ubuntu
            asset_name: DocumentReplacer_Ubuntu
          - os: macos-latest
            artifact_name: DocumentReplacer_macOS
            asset_name: DocumentReplacer_macOS
          - os: windows-latest
            artifact_name: DocumentReplacer_Windows.exe
            asset_name: DocumentReplacer_Windows.exe

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller pillow tkinterdnd2

    - name: Build executable with PyInstaller
      run: |
        # macOS 和 Ubuntu 下使用冒号作为路径分隔符，Windows 使用分号
        if [ "$RUNNER_OS" == "Windows" ]; then
          pyinstaller --onefile --windowed --name "${{ matrix.artifact_name }}" --icon=app_icon.ico --add-data "app_icon.ico;." --collect-data tkinterdnd2 main.py
        else
          pyinstaller --onefile --windowed --name "${{ matrix.artifact_name }}" --icon=app_icon.ico --add-data "app_icon.ico:." --collect-data tkinterdnd2 main.py
        fi
      shell: bash

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.artifact_name }}
        path: dist/${{ matrix.artifact_name }}
